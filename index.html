<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Decentralized Government</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; background-color: #f4f7f6; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 90%; }
        h1 { color: #673ab7; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; }
        #status { margin-top: 20px; padding: 10px; font-size: 14px; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        .login-btn {
            background-color: #673ab7;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            display: none; 
        }
        #user-info { margin-top: 30px; padding: 20px; border-top: 1px solid #eee; display: none; }
        .username { font-size: 22px; font-weight: bold; color: #333; }
        .logout-btn { margin-top: 15px; background: none; border: 1px solid #ff5252; color: #ff5252; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to the decentralized international government.</h1>
        <p>Please log in to access the platform.</p>

        <button id="login-button" class="login-btn">Login with Pi</button>

        <div id="user-info">
            <p>Welcome back,</p>
            <div class="username" id="username-display"></div>
            <button class="logout-btn" onclick="location.reload()">Logout</button>
        </div>

        <div id="status">Initializing SDK...</div>
    </div>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        const statusDiv = document.getElementById('status');
        const loginButton = document.getElementById('login-button');
        const userInfoDiv = document.getElementById('user-info');
        const usernameDisplay = document.getElementById('username-display');

        function updateStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = type; // 'success' or 'error'
        }

        // مقداردهی اولیه Pi SDK
        try {
            Pi.init({ 
                version: "2.0", 
                sandbox: true, 
                appId: "pidao-pi-2uk8",
                // *** اضافه کردن client_id ***
                clientId: "c_1Hj75SyO_wbM4BUaxgVzuOmplNnrDj_2pWxDUkD8Q",
                // *** اضافه کردن Redirect URI ***
                // این آدرس باید دقیقاً با آدرسی که در Pi Developer Portal ثبت کرده‌اید مطابقت داشته باشد.
                redirectUri: "https://tiraxturumuz1.github.io/index.html" 
            });
            
            updateStatus("SDK Connected!", "success");
            loginButton.style.display = "inline-block"; // دکمه ورود را نمایش بده
        } catch (e) {
            updateStatus("Init Error: " + e.message, "error");
            console.error("Pi SDK initialization failed:", e);
        }

        // مدیریت کلیک دکمه ورود با استفاده از روش Callback
        loginButton.onclick = function() {
            updateStatus("Authenticating...", ""); // نمایش پیام در حال احراز هویت
            
            // استفاده از مدل Callback به جای Async/Await برای سازگاری بهتر با برخی نسخه‌های SDK
            loginButton.onclick = function() {
    console.log("Login button clicked!");
    updateStatus("Authenticating...", "");
    // ...
                
            Pi.authenticate(true, function(err, auth) {
                if (err) {
                    // اگر خطایی رخ داد، متن خطا را نمایش بده و جزئیات را در کنسول ثبت کن
                    updateStatus("Auth Error: " + err.message, "error");
                    console.error("Authentication error object:", err);
                    // در صورت نیاز، می‌توانید کدهای بیشتری برای مدیریت خطا اضافه کنید،
                    // مانند نمایش دلیل دقیق‌تر خطا به کاربر یا پاک کردن داده‌های احراز هویت قبلی.
                    return;
                }
                
                // اگر احراز هویت موفقیت‌آمیز بود و اطلاعات کاربر دریافت شد
                if (auth && auth.user) {
                    showUser(auth.user);
                } else {
                    // اگر احراز هویت موفق بود اما اطلاعات کاربر دریافت نشد
                    updateStatus("Authentication successful, but no user data received.", "error");
                    console.error("No user data received after authentication.");
                }
            });
        };

        // تابعی برای نمایش اطلاعات کاربر پس از ورود موفق
        function showUser(user) {
            loginButton.style.display = "none";         // دکمه ورود را مخفی کن
            statusDiv.style.display = "none";           // پیام وضعیت را مخفی کن
            userInfoDiv.style.display = "block";        // پنل اطلاعات کاربر را نمایش بده
            usernameDisplay.textContent = "@" + user.username; // نام کاربری را نمایش بده
        }
    </script>
</body>
</html>
