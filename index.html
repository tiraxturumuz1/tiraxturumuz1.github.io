<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi Dao</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #f4f7fb;
    }
    button {
      margin: 10px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #673ab7;
      color: white;
      font-size: 16px;
    }
    #status {
      margin-top: 20px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>Pi Dao</h1>
  <p>Welcome to Pi Dao</p>

  <button id="loginButton">Login with Pi</button>
  <button id="payBtn">Pay 1 Pi</button>

  <div id="status">Initializing...</div>

  <script>
    const statusDiv = document.getElementById("status");
    const loginButton = document.getElementById("loginButton");
    const payBtn = document.getElementById("payBtn");

    function updateStatus(msg) {
      statusDiv.textContent = msg;
    }

    window.onload = function () {
      if (typeof Pi === "undefined") {
        updateStatus("Error: Pi SDK not found.");
        return;
      }

      Pi.init({
        version: "2.0",
        sandbox: true,
        appId: "pidao-pi-2uk8",
        clientId: "c_1Hj75SyO_wbM4BUaxgVzuOmplNnrDj_2pWxDUkD8Q",
        redirectUri: "https://apppidaonkm2562.pinet.com/index.html"
      });

      updateStatus("SDK ready.");
    };

    loginButton.addEventListener("click", function () {
      updateStatus("Authenticating...");
      Pi.authenticate(["username"], function (payment) {
        console.log("Incomplete payment found:", payment);
      }).then(function (auth) {
        console.log("Auth result:", auth);
        if (auth && auth.user) {
          updateStatus("Welcome @" + auth.user.username);
        } else {
          updateStatus("No user data received.");
        }
      }).catch(function (err) {
        console.error("Auth Error:", err);
        updateStatus("Auth Error: " + (err.message || "User cancelled"));
      });
    });

    payBtn.addEventListener("click", function () {
      updateStatus("Creating payment...");
      Pi.createPayment(
        {
          amount: 1,
          memo: "Test payment",
          metadata: { orderId: "123" }
        },
        {
          onReadyForServerApproval: async (paymentId) => {
            updateStatus("Approving payment...");
            await fetch("https://apppidaonkm2562.pinet.com/approve", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId })
            });
          },
          onReadyForServerCompletion: async (paymentId, txid) => {
            updateStatus("Completing payment...");
            await fetch("https://apppidaonkm2562.pinet.com/complete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ paymentId, txid })
            });
            updateStatus("Payment completed.");
          },
          onCancel: (paymentId) => {
            updateStatus("Payment cancelled: " + paymentId);
          },
          onError: (error, payment) => {
            console.log(error, payment);
            updateStatus("Payment error.");
          }
        }
      );
    });
  </script>
</body>
</html>
