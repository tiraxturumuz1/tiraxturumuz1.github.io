<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pi Ultimate Debug</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        #status { padding: 20px; border: 2px solid #ccc; margin: 20px; min-height: 50px; }
        .error { color: red; border-color: red !important; background: #fee; }
        .success { color: green; border-color: green !important; background: #efe; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #673ab7; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>Pi Connection Test</h1>
    <div id="status">Initializing...</div>
    <button id="login-btn" style="display:none;">CONNECT TO PI</button>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <script>
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('login-btn');

        function update(msg, isErr = false) {
            statusDiv.textContent = msg;
            statusDiv.className = isErr ? "error" : "success";
        }

        window.onload = function() {
            // مرحله ۱: مقداردهی اولیه
            Pi.init({ 
                version: "2.0", 
                sandbox: true, // <--- حتماً با وضعیت پنل خود یکی کنید (اگر Mainnet هستید false کنید)
                appId: "pidao-pi-2uk8",
                clientId: "c_1Hj75SyO_wbM4BUaxgVzuOmplNnrDj_2pWxDUkD8Q",
                redirectUri: "https://tiraxturumuz1.github.io/index.html" 
            }).then(() => {
                update("Step 1: OK! Ready to connect.");
                btn.style.display = "inline-block";
            }).catch(err => {
                update("Step 1 ERROR: " + JSON.stringify(err), true);
            });
        };

        btn.onclick = function() {
            update("Step 2: Sending request to Pi Network...");
            btn.disabled = true;

            // ایجاد یک تایمر برای اینکه اگر پاسخی نیامد، بفهمیم مشکل از کجاست
            const timeout = setTimeout(() => {
                update("TIMEOUT ERROR: The Pi Network did not respond. This usually means your Redirect URI is wrong in the Pi Developer Portal or Sandbox mode mismatch.", true);
                btn.disabled = false;
            }, 10000); // اگر ۱۰ ثانیه پاسخی نیامد

            Pi.authenticate(['username'], function(err, auth) {
                clearTimeout(timeout); // اگر پاسخی آمد، تایمر را متوقف کن
                btn.disabled = false;

                if (err) {
                    update("Step 2 ERROR: " + JSON.stringify(err), true);
                } else if (auth && auth.user) {
                    update("SUCCESS! Welcome " + auth.user.username);
                    btn.style.display = "none";
                } else {
                    update("Unknown error: No data received.", true);
                }
            });
        };
    </script>
</body>
</html>
