<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Dao - Payment Test</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; background-color: #f4f7f6; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 90%; width: 400px; }
        h1 { color: #673ab7; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; }
        #status { margin-top: 20px; padding: 15px; font-size: 14px; border-radius: 5px; background: #eee; min-height: 20px; }
        .success { color: #2e7d32; background: #e8f5e9 !important; border: 1px solid #c8e6c9; }
        .error { color: #c62828; background: #ffebee !important; border: 1px solid #ffcdd2; }
        
        .action-btn {
            background-color: #673ab7;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            display: none; 
            width: 100%;
            transition: background 0.3s;
        }
        .action-btn:hover { background-color: #512da8; }
        
        #payment-button { background-color: #00c853; display: none; }
        #payment-button:hover { background-color: #00a040; }

        #user-info { margin-top: 30px; padding: 20px; border-top: 1px solid #eee; display: none; }
        .username { font-size: 22px; font-weight: bold; color: #333; }
        .logout-btn { margin-top: 15px; background: none; border: 1px solid #ff5252; color: #ff5252; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="main-title">Pi Dao</h1>
        <p id="main-desc">Please log in to access the platform.</p>

        <!-- دکمه لاگین -->
        <button id="login-button" class="action-btn" style="display: inline-block;">Login with Pi</button>
        
        <!-- دکمه پرداخت (بعد از لاگین ظاهر می‌شود) -->
        <button id="payment-button" class="action-btn">Pay 1.0 Pi</button>

        <!-- اطلاعات کاربر -->
        <div id="user-info">
            <p>Welcome back,</p>
            <div class="username" id="username-display"></div>
            <button class="logout-btn" onclick="location.reload()">Logout</button>
        </div>

        <div id="status">Initializing SDK...</div>
    </div>

    <!-- ۱. لود کردن اسکریپت اصلی -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <script>
        const statusDiv = document.getElementById('status');
        const loginButton = document.getElementById('login-button');
        const paymentButton = document.getElementById('payment-button');
        const userInfoDiv = document.getElementById('user-info');
        const usernameDisplay = document.getElementById('username-display');
        const mainTitle = document.getElementById('main-title');
        const mainDesc = document.getElementById('main-desc');

        function updateStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = type; 
            console.log(`[Status]: ${msg} (${type})`);
        }

        // ۲. مقداردهی اولیه SDK
        window.onload = function() {
            if (typeof Pi === 'undefined') {
                updateStatus("Error: Pi SDK not found. Make sure you are in Pi Browser.", "error");
                return;
            }

            Pi.init({ 
                version: "2.0", 
                sandbox: true, 
                appId: "pidao-pi-2uk8",
                clientId: "c_1Hj75SyO_wbM4BUaxgVzuOmplNnrDj_2pWxDUkD8Q",
                redirectUri: "https://tiraxturumuz1.github.io/index.html" 
            }).then(() => {
                updateStatus("SDK Connected!", "success");
                loginButton.style.display = "inline-block";
            }).catch((err) => {
                updateStatus("Init Error: " + err.message, "error");
            });
        };

        // ۳. مدیریت احراز هویت (Login)
        loginButton.addEventListener('click', function() {
            updateStatus("Authenticating...", "");
            
            Pi.authenticate(['username'], function(payment) {
                // مدیریت پرداخت‌های ناقص (Incomplete Payments)
                if (payment) {
                    updateStatus("Resuming previous payment...", "");
                    console.log('Incomplete payment found:', payment);
                }
            }).then(function(auth) {
                if (auth && auth.user) {
                    showUser(auth.user);
                } else {
                    updateStatus("No user data received.", "error");
                }
            }).catch(function(err) {
                updateStatus("Auth Error: " + (err.message || 'User cancelled'), "error");
            });
        });

        function showUser(user) {
            // تغییر رابط کاربری پس از لاگین
            loginButton.style.display = "none";
            mainTitle.textContent = "Dashboard";
            mainDesc.textContent = "You are logged in. Ready to purchase?";
            
            userInfoDiv.style.display = "block";
            usernameDisplay.textContent = "@" + user.username;
            
            // نمایش دکمه پرداخت
            paymentButton.style.display = "inline-block";
            updateStatus("Logged in successfully!", "success");
        }

        // ۴. مدیریت فرآیند پرداخت (Payment)
        paymentButton.addEventListener('click', function() {
            updateStatus("Preparing for a payment...", "");
            
            // غیرفعال کردن دکمه برای جلوگیری از کلیک‌های تکراری
            paymentButton.disabled = true;
            paymentButton.style.opacity = "0.5";

            Pi.createPayment({
                amount: 1.0,
                memo: "Test purchase for Pi Dao",
                metadata: { orderId: "order_12345" }
            }, function(payment) {
                // این بخش برای مدیریت تراکنش‌های نیمه‌تمام است
                console.log('Incomplete payment found during createPayment:', payment);
            }).then(function(result) {
                // این بخش وقتی اجرا می‌شود که درخواست با موفقیت به درگاه ارسال شده باشد
                console.log("Payment initiated successfully:", result);
                updateStatus("Please check your Pi Wallet to confirm.", "success");
            }).catch(function(err) {
                // مدیریت خطاها (مانند کنسل شدن توسط کاربر)
                console.error("Payment Error:", err);
                paymentButton.disabled = false;
                paymentButton.style.opacity = "1";
                updateStatus("Payment Error: " + (err.message || 'Transaction failed'), "error");
            });
        });

    </script>
</body>
</html>
