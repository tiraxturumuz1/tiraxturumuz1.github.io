<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Dao</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; background-color: #f4f7f6; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 90%; }
        h1 { color: #673ab7; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; }
        #status { margin-top: 20px; padding: 10px; font-size: 14px; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        .login-btn {
            background-color: #673ab7;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            display: none; 
        }
        #user-info { margin-top: 30px; padding: 20px; border-top: 1px solid #eee; display: none; }
        .username { font-size: 22px; font-weight: bold; color: #333; }
        .logout-btn { margin-top: 15px; background: none; border: 1px solid #ff5252; color: #ff5252; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .pay-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            display: none;
        }
        .pay-btn:disabled { background-color: #aaa; cursor: not-allowed; }
        #payment-status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome.</h1>
        <p>Please log in to access the platform.</p>

        <button id="login-button" class="login-btn">Login with Pi</button>

        <div id="user-info">
            <p>Welcome back,</p>
            <div class="username" id="username-display"></div>
            <button id="pay-button" class="pay-btn">Pay 0.0001 Pi (Test)</button>
            <div id="payment-status"></div>
            <button class="logout-btn" onclick="location.reload()">Logout</button>
        </div>

        <div id="status">Initializing SDK...</div>
    </div>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <script>
        const statusDiv = document.getElementById('status');
        const loginButton = document.getElementById('login-button');
        const userInfoDiv = document.getElementById('user-info');
        const usernameDisplay = document.getElementById('username-display');
        const payButton = document.getElementById('pay-button');
        const paymentStatus = document.getElementById('payment-status');

        function updateStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = type; 
        }

        window.onload = function() {
            if (typeof Pi === 'undefined') {
                updateStatus("Error: Pi SDK not found. Use Pi Browser.", "error");
                return;
            }

            Pi.init({ 
                version: "2.0", 
                sandbox: true, 
                appId: "pidao-pi-2uk8",
                clientId: "c_1Hj75SyO_wbM4BUaxgVzuOmplNnrDj_2pWxDUkD8Q",
                redirectUri: "https://tiraxturumuz1.github.io/index.html" 
            }).then(() => {
                updateStatus("SDK Connected!", "success");
                loginButton.style.display = "inline-block";
            }).catch((err) => {
                updateStatus("Init Error: " + err.message, "error");
            });
        };

        // ⚠️ نکته کلیدی: افزودن 'payments' به اسکوپ‌ها
        loginButton.addEventListener('click', function() {
            updateStatus("Authenticating...", "");

            Pi.authenticate(['username', 'payments'], function(payment) {
                console.log('Incomplete payment found:', payment);
            }).then(function(auth) {
                if (auth && auth.user) {
                    showUser(auth.user);
                } else {
                    updateStatus("No user data received.", "error");
                }
            }).catch(function(err) {
                updateStatus("Auth Error: " + (err.message || 'User cancelled'), "error");
            });
        });

        function showUser(user) {
            loginButton.style.display = "none";
            statusDiv.style.display = "none";
            userInfoDiv.style.display = "block";
            usernameDisplay.textContent = "@" + user.username;
            payButton.style.display = "inline-block";
        }

        // ------------------- پرداخت (حالا مجوز payments داریم) -------------------
        payButton.addEventListener('click', function() {
            payButton.disabled = true;
            paymentStatus.textContent = "Creating payment...";
            paymentStatus.className = "";

            Pi.createPayment({
                amount: 0.0001,
                memo: "Test payment for Pi Dao",
                metadata: { orderId: "12345" }
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("onReadyForServerApproval:", paymentId);
                    paymentStatus.textContent = "Payment created. Waiting for approval...";
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    console.log("onReadyForServerCompletion:", paymentId, txid);
                    paymentStatus.textContent = "Payment completed successfully!";
                    payButton.disabled = false;
                },
                onCancel: function(paymentId) {
                    console.log("onCancel:", paymentId);
                    paymentStatus.textContent = "Payment cancelled.";
                    payButton.disabled = false;
                },
                onError: function(error, payment) {
                    console.error("onError:", error, payment);
                    paymentStatus.textContent = "Error: " + error.message;
                    payButton.disabled = false;
                }
            }).then(function(res) {
                console.log("Payment Promise resolved:", res);
                // این خط فقط پس از تکمیل سمت سرور اجرا می‌شود
            }).catch(function(err) {
                console.error("Payment Promise rejected:", err);
                paymentStatus.textContent = "Payment failed: " + (err.message || JSON.stringify(err));
                payButton.disabled = false;
            });
        });
    </script>
</body>
</html>
