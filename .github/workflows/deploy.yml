name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main  # یا نام برنچ اصلی شما

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist # پوشه ساخته شده را برمی‌دارد
          branch: gh-pages # آن را در یک شاخه جدید می‌ریزد
          
