# این فایل برای اسکن امنیتی خودکار کدها با استفاده از CodeQL تنظیم شده است.
# این ابزار به صورت خودکار در هر Push یا Pull Request اجرا می‌شود.

name: "CodeQL Advanced Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # اسکن خودکار هر پنجشنبه ساعت ۰۱:۵۵ به وقت UTC
    - cron: '25 11 * * 4'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # اسکن کردن فایل‌های تنظیمات GitHub Actions برای امنیت ورک‌فلوها
          - language: actions
            build-mode: none
          # اسکن کردن کدهای فرانت‌اِند و بک‌اِند (JavaScript و TypeScript)
          - language: javascript-typescript
            build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # مقداردهی اولیه ابزارهای CodeQL
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        # استفاده از کوئری‌های استاندارد برای امنیت و کیفیت کد
        queries: security-extended,security-and-quality

    # اجرای تحلیل امنیتی
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
